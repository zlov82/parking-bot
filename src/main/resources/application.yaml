spring:
  application:
    name: parking-bot

telegram:
  bot:
    username: ${BOT_USER_NAME}
    token: ${BOT_TOKEN}
    api-key: ${BOT_API_KEY}
    private-group-id: ${TELEGRAM_PRIVATE_CHAT}
    start-message: ${BOT_START_MESSAGE}
    check-user-group: ${CHECK_USER_GROUP}
    cleaning-free: ${CLEANING_FREE}
    photo-upload-enabled: ${PHOTO_UPLOAD_ENABLED:false}

server:
  port: 3315

backend:
  api-key: ${BOT_BACKEND_API_KEY}
  base-url: ${BOT_BACKEND_URL}

proxy:
  enabled: ${PROXY_ENABLED:false}
  host: ${PROXY_HOST:}
  port: ${PROXY_PORT:1080}
  username: ${PROXY_USERNAME:}
  password: ${PROXY_PASSWORD:}

logging:
  level:
    ru.parking.parking_bot: DEBUG